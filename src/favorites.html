<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorites - Tasty Treats</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"/>
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="container header-container">
        
        <nav class="nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="favorites.html" class="nav-link active">Favorites</a>
        </nav>

        <div class="logo">
          <a href="index.html" style="text-decoration: none;">
            <span class="logo-tasty">tasty</span><span class="logo-treats">treats.</span>
          </a>
        </div>

        <div class="header-actions">
          <!-- Cart Icon Placeholder -->
          <button class="cart-btn" id="header-cart-btn" aria-label="Cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
          </button>
          <!-- Theme Switcher -->
          <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox">
              <input type="checkbox" id="checkbox" />
              <div class="slider round"></div>
            </label>
          </div>
          <!-- Hamburger Menu (Mobile) -->
          <button class="hamburger-btn" id="hamburger-btn" aria-label="Open Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-backdrop" id="mobile-menu">
      <div class="mobile-menu-content">
        <button class="mobile-close-btn" id="mobile-close-btn">&times;</button>
        <nav class="mobile-nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="favorites.html" class="nav-link active">Favorites</a>
        </nav>
      </div>
    </div>

    <!-- Main Content -->
    <main class="container main-content" style="padding-top: 40px;">
      <div class="content-wrapper">
        <!-- Categories Sidebar -->
        <aside class="sidebar">
          <button class="all-categories-btn" id="all-categories-btn">All categories</button>
          <ul class="categories-list" id="fav-categories-list">
            <!-- Categories injected here -->
          </ul>
        </aside>

        <!-- Recipes Area -->
        <section class="recipes-section">
          <!-- Recipe Gallery -->
          <div class="recipe-gallery" id="recipe-gallery">
            <!-- Recipes injected here -->
          </div>
        </section>
      </div>

      <!-- Recipe Modal -->
      <div class="modal-backdrop" id="recipe-modal-backdrop">
        <div class="modal-content" id="recipe-modal-content">
          <!-- Modal content injected here -->
        </div>
      </div>
    </main>

    <!-- Script Entry -->
    <script type="module" src="./js/favorites.js"></script>
  </body>
</html>
