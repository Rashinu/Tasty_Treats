<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasty Treats</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <!-- API Preconnect for LCP discovery -->
    <link rel="preconnect" href="https://tasty-treats-backend.p.goit.global" crossorigin>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Normalize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"/>
    <!-- Main CSS -->
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="container header-container">
        
        <nav class="nav">
          <a href="index.html" class="nav-link active">Home</a>
          <a href="favorites.html" class="nav-link">Favorites</a>
        </nav>

        <div class="logo">
          <a href="index.html" style="text-decoration: none;">
            <span class="logo-tasty">tasty</span><span class="logo-treats">treats.</span>
          </a>
        </div>

        <div class="header-actions">
          <!-- Cart Icon Placeholder -->
          <button class="cart-btn" id="header-cart-btn" aria-label="Cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
          </button>
          <!-- Theme Switcher -->
          <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox">
              <input type="checkbox" id="checkbox" />
              <div class="slider round"></div>
            </label>
          </div>
          <!-- Hamburger Menu (Mobile) -->
          <button class="hamburger-btn" id="hamburger-btn" aria-label="Open Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu-backdrop" id="mobile-menu">
      <div class="mobile-menu-content">
        <button class="mobile-close-btn" id="mobile-close-btn">&times;</button>
        <nav class="mobile-nav">
          <a href="index.html" class="nav-link active">Home</a>
          <a href="favorites.html" class="nav-link">Favorites</a>
        </nav>
      </div>
    </div>

    <!-- Main Content -->
    <main class="container main-content">
      
      <!-- Hero Section -->
      <section class="hero">
        <div class="hero-text-block">
          <h1 class="hero-title">
            LEARN TO COOK <span class="highlight">TASTY TREATS'</span> CUSTOMIZABLE MASTERCLASS
          </h1>
          <p class="hero-subtitle">
            TastyTreats - Customize Your Meal with Ingredient Options and Step-by-Step Video Guides.
          </p>
          <button class="btn btn-outline-primary" id="order-now-hero-btn">Order now</button>
        </div>

        <div class="hero-slider-container">
          <!-- Swiper Container -->
          <div class="swiper hero-swiper" id="hero-swiper">
            <div class="swiper-wrapper" id="hero-swiper-wrapper">
              <!-- Slides injected here -->
            </div>
            <div class="swiper-pagination slider-pagination"></div>
          </div>
        </div>
      </section>

      <!-- Content Area: Sidebar + Grid -->
      <div class="content-wrapper">
        <!-- Categories Sidebar -->
        <aside class="sidebar">
          <button class="all-categories-btn active" id="all-categories-btn">All categories</button>
          <ul class="categories-list" id="categories-list">
            <!-- Categories injected here -->
          </ul>
          
          <div class="popular-recipes-section" id="popular-recipes-section" style="display: none;">
            <h3 class="popular-title">POPULAR RECIPES</h3>
            <div class="popular-recipes-list" id="popular-recipes-list">
              <!-- Popular injected here -->
            </div>
          </div>
        </aside>

        <!-- Recipes Area -->
        <section class="recipes-section">
          <!-- Filters -->
          <div class="filters-bar">
            <div class="search-box">
              <label for="search-input">Search</label>
              <div class="input-with-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Enter Text" />
              </div>
            </div>
            <div class="filter-selects">
              <div class="select-group">
                <label for="time-select">Time</label>
                <select id="time-select">
                  <option value="">All</option>
                  <!-- 5 to 120 min options -->
                </select>
              </div>
              <div class="select-group">
                <label for="area-select">Area</label>
                <select id="area-select">
                  <option value="">All</option>
                  <!-- Areas injected here -->
                </select>
              </div>
              <div class="select-group">
                <label for="ingredient-select">Ingredients</label>
                <select id="ingredient-select">
                  <option value="">All</option>
                  <!-- Ingredients injected here -->
                </select>
              </div>
            </div>
            <div class="filter-reset-wrapper">
              <button class="btn-reset" id="reset-filters-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
                Reset the filter
              </button>
            </div>
          </div>

          <!-- Recipe Gallery -->
          <div class="recipe-gallery" id="recipe-gallery">
            <!-- Recipes injected here -->
          </div>

          <!-- Pagination -->
          <div class="pagination" id="pagination">
            <!-- Pagination injected here -->
          </div>
        </section>
      </div>

      <!-- Recipe Modal -->
      <div class="modal-backdrop" id="recipe-modal-backdrop">
        <div class="modal-content" id="recipe-modal-content">
          <!-- Modal content injected here -->
        </div>
      </div>

      <!-- Order Modal -->
      <div class="modal-backdrop" id="order-modal-backdrop">
        <div class="modal-content modal-dark" style="max-width: 400px; padding: 40px;">
          <button class="modal-close-btn" id="order-close-btn">✕</button>
          <h2 class="modal-title" style="font-size: 16px; margin-bottom: 30px;">ORDER NOW</h2>
          <form id="order-form">
            <div class="form-group form-dark">
              <label for="order-name">Name</label>
              <input type="text" id="order-name" required minlength="2" />
            </div>
            <div class="form-group form-dark">
              <label for="order-phone">Phone number</label>
              <input type="tel" id="order-phone" required pattern="[0-9]{10,14}" />
            </div>
            <div class="form-group form-dark">
              <label for="order-email">Email</label>
              <input type="email" id="order-email" required />
            </div>
            <div class="form-group form-dark">
              <label for="order-comment">Comment</label>
              <textarea id="order-comment" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Send</button>
          </form>
        </div>
      </div>

      <!-- Rating Modal -->
      <div class="modal-backdrop" id="rating-modal-backdrop">
        <div class="modal-content modal-dark" style="max-width: 320px; padding: 30px;">
          <button class="modal-close-btn" id="rating-close-btn">✕</button>
          <div style="margin-bottom: 25px;">
            <div style="font-size: 14px; font-weight: 500; margin-bottom: 10px;">Rating</div>
            <div style="display: flex; align-items: center; gap: 10px;">
              <span id="rating-score-display" style="font-weight: 500;">0.0</span>
              <div class="rating-stars-input" id="rating-stars-input" style="margin: 0; font-size: 20px;">
                <span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
              </div>
            </div>
          </div>
          <form id="rating-form">
            <input type="hidden" id="rating-recipe-id" />
            <input type="hidden" id="rating-value" value="0" />
            <div class="form-group form-dark" style="margin-bottom: 20px;">
              <input type="email" id="rating-email" placeholder="Enter email" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Send</button>
          </form>
        </div>
      </div>
    </main>

    <!-- Scroll Up Button -->
    <button id="scroll-up-btn" class="scroll-up-btn">↑</button>

    <!-- Global Loader -->
    <div id="global-loader" class="loader-backdrop">
      <div class="loader-spinner"></div>
    </div>

    <!-- Script Entry -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
